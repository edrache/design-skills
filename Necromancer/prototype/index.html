<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Necromancer Island - Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <div id="ui-overlay">
            <div id="status-panel">
                <div id="turn-counter">Month: 0</div>
                <div id="global-stability">Equilibrium: Stable</div>
            </div>
            <div id="action-panel">
                <button id="step-btn">Next Month</button>
                <button id="auto-btn">Auto Simulation</button>
            </div>
        </div>
        <div id="grid"></div>
        <div id="log">
            <p>Welcome, Necromancer. The island awaits your touch.</p>
        </div>
    </div>
    <script src="game.js"></script>
</body>

</html>
